<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-touch-fullscreen" content="yes">
    <title>🎨 Kolorowanka!</title>
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', cursive;
            background: #fff9e6;
        }

        /* ===== VIEWS ===== */
        .view {
            display: none;
            position: fixed;
            inset: 0;
            flex-direction: column;
            overflow: hidden;
        }

        .view.active {
            display: flex;
        }

        /* ===== APP HEADER ===== */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            flex-shrink: 0;
            gap: 10px;
        }

        .header-list {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff9a3c 100%);
            box-shadow: 0 4px 16px rgba(255, 107, 157, 0.4);
        }

        .header-color {
            background: linear-gradient(135deg, #7c4dff 0%, #448aff 100%);
            box-shadow: 0 4px 16px rgba(124, 77, 255, 0.4);
        }

        .app-title {
            font-size: clamp(22px, 5vw, 38px);
            color: white;
            text-shadow: 2px 3px 6px rgba(0, 0, 0, 0.25);
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            text-align: center;
        }

        /* ===== BUTTONS ===== */
        .btn {
            border: none;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn:active {
            transform: scale(0.92);
            opacity: 0.85;
        }

        .btn-close {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.28);
            border: 3px solid rgba(255, 255, 255, 0.8);
            color: white;
            font-size: 26px;
        }

        .btn-close:hover {
            background: rgba(255, 255, 255, 0.42);
        }

        .btn-back {
            padding: 12px 20px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.28);
            border: 3px solid rgba(255, 255, 255, 0.8);
            color: white;
            font-size: clamp(15px, 2.5vw, 20px);
            gap: 6px;
            white-space: nowrap;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.42);
        }

        /* ===== VIEW 1 – IMAGE LIST ===== */
        #view-list {
            background: linear-gradient(160deg, #fffde7 0%, #fce4ec 50%, #e8eaf6 100%);
        }

        .list-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .list-content::-webkit-scrollbar { display: none; }

        /* Empty state */
        .empty-state {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            gap: 14px;
        }

        .empty-state .big-emoji {
            font-size: clamp(80px, 18vw, 140px);
            line-height: 1;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(-3deg); }
            50%       { transform: translateY(-18px) rotate(3deg); }
        }

        .empty-state .empty-title {
            font-size: clamp(22px, 5vw, 36px);
            color: #f06292;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.1);
        }

        .empty-state .empty-sub {
            font-size: clamp(14px, 3vw, 20px);
            color: #bbb;
            line-height: 1.5;
        }

        /* Image grid */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 4px 0;
        }

        @media (max-width: 500px) {
            .image-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
        }

        .image-card {
            background: white;
            border-radius: 22px;
            padding: 14px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.10);
            border: 4px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            min-height: 180px;
            justify-content: center;
        }

        .image-card:hover, .image-card:active {
            transform: scale(1.05) translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.18);
            border-color: #ff6b9d;
        }

        .image-card svg {
            width: 100%;
            max-height: 140px;
        }

        .card-title {
            font-size: clamp(14px, 2.5vw, 18px);
            color: #555;
            text-align: center;
            font-weight: bold;
        }

        /* ===== GRUPY TRUDNOŚCI ===== */
        .difficulty-section {
            margin-bottom: 32px;
        }

        .difficulty-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .difficulty-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: clamp(16px, 3vw, 22px);
            font-weight: bold;
            color: white;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.2);
            box-shadow: 0 4px 14px rgba(0,0,0,0.15);
            white-space: nowrap;
        }

        .badge-easy {
            background: linear-gradient(135deg, #66bb6a 0%, #a5d6a7 100%);
            box-shadow: 0 4px 14px rgba(102, 187, 106, 0.45);
        }

        .badge-medium {
            background: linear-gradient(135deg, #ffa726 0%, #ffcc80 100%);
            box-shadow: 0 4px 14px rgba(255, 167, 38, 0.45);
        }

        .badge-hard {
            background: linear-gradient(135deg, #ef5350 0%, #ef9a9a 100%);
            box-shadow: 0 4px 14px rgba(239, 83, 80, 0.45);
        }

        .difficulty-line {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            opacity: 0.3;
        }

        .line-easy   { background: #66bb6a; }
        .line-medium { background: #ffa726; }
        .line-hard   { background: #ef5350; }

        /* Pusta sekcja trudna */
        .empty-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 22px;
            background: rgba(255,255,255,0.55);
            border-radius: 18px;
            border: 3px dashed rgba(239, 83, 80, 0.3);
            color: #ccc;
            font-size: clamp(14px, 2.5vw, 18px);
        }

        /* ===== VIEW 2 – COLORING ===== */
        #view-color {
            background: linear-gradient(160deg, #fffde7 0%, #e8eaf6 100%);
        }

        /* Color picker bar */
        .color-picker-bar {
            background: white;
            padding: 10px 16px 12px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.10);
            flex-shrink: 0;
        }

        .color-picker-label {
            font-size: clamp(13px, 2vw, 17px);
            color: #888;
            text-align: center;
            margin-bottom: 8px;
        }

        .color-swatches {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .color-swatch {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            cursor: pointer;
            border: 4px solid white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.20);
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
            flex-shrink: 0;
            position: relative;
        }

        @media (max-width: 500px) {
            .color-swatch { width: 44px; height: 44px; }
        }

        .color-swatch:hover, .color-swatch:active {
            transform: scale(1.20);
            box-shadow: 0 6px 18px rgba(0,0,0,0.28);
        }

        .color-swatch.selected {
            border-color: #333;
            transform: scale(1.28);
            box-shadow: 0 6px 20px rgba(0,0,0,0.35);
        }

        .color-swatch.selected::after {
            content: '✓';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: rgba(255,255,255,0.85);
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        /* SVG canvas */
        .svg-canvas-wrap {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
        }

        #coloring-svg-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #coloring-svg-container svg {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            background: white;
            border-radius: 22px;
            box-shadow: 0 8px 36px rgba(0,0,0,0.16);
        }

        #coloring-svg-container svg [data-colorable] {
            cursor: pointer;
            transition: fill 0.22s ease, opacity 0.15s ease;
        }

        #coloring-svg-container svg [data-colorable]:hover {
            opacity: 0.78;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: white;
            border-radius: 28px;
            padding: 36px 40px 28px;
            text-align: center;
            max-width: 360px;
            width: 88%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.30);
            animation: popIn 0.22s ease;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        .modal-emoji {
            font-size: 64px;
            margin-bottom: 14px;
            line-height: 1;
        }

        .modal-text {
            font-size: clamp(18px, 3vw, 24px);
            color: #444;
            margin-bottom: 28px;
            line-height: 1.45;
        }

        .modal-buttons {
            display: flex;
            gap: 14px;
            justify-content: center;
        }

        .btn-modal {
            padding: 14px 32px;
            border-radius: 30px;
            border: none;
            font-size: clamp(16px, 2.5vw, 20px);
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
        }

        .btn-modal:active { transform: scale(0.93); opacity: 0.85; }

        .btn-modal-no {
            background: #e0e0e0;
            color: #555;
        }

        .btn-modal-yes {
            background: linear-gradient(135deg, #ff6b9d, #ff9a3c);
            color: white;
            box-shadow: 0 4px 14px rgba(255, 107, 157, 0.4);
        }
    </style>
</head>

     VIEW 1 – Lista obrazków

</div>

let selectedColor = COLORS[0].value;

/* ============================================================
   INICJALIZACJA
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => {
    buildColorSwatches();
    buildImageList();
});

/* ============================================================
   BUDOWANIE LISTY OBRAZKÓW (z podziałem na grupy trudności)
   ============================================================ */
function buildImageList() {
    const container = document.getElementById('list-content');

    if (IMAGES.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="big-emoji">🖌️</div>
                <p class="empty-title">Tu będą obrazki<br>do kolorowania!</p>
                <p class="empty-sub">Lista jest jeszcze pusta.<br>Niedługo coś tu się pojawi 😊</p>
            </div>`;
        return;
    }

    const groups = [
        {
            key: 'easy',
            label: '⭐ Łatwe',
            badgeClass: 'badge-easy',
            lineClass: 'line-easy',
            emptyText: '😊 Nie ma jeszcze obrazków…'
        },
        {
            key: 'medium',
            label: '⭐⭐ Średnie',
            badgeClass: 'badge-medium',
            lineClass: 'line-medium',
            emptyText: '🙂 Nie ma jeszcze obrazków…'
        },
        {
            key: 'hard',
            label: '⭐⭐⭐ Trudne',
            badgeClass: 'badge-hard',
            lineClass: 'line-hard',
            emptyText: '🔥 Wkrótce – będą tu najtrudniejsze obrazki!'
        },
    ];

    container.innerHTML = '';

    groups.forEach(group => {
        const items = IMAGES.filter(img => img.difficulty === group.key);

        const section = document.createElement('div');
        section.className = 'difficulty-section';

        // Nagłówek grupy
        section.innerHTML = `
            <div class="difficulty-header">
                <span class="difficulty-badge ${group.badgeClass}">${group.label}</span>
                <div class="difficulty-line ${group.lineClass}"></div>
            </div>`;

        if (items.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'empty-group';
            empty.textContent = group.emptyText;
            section.appendChild(empty);
        } else {
            const grid = document.createElement('div');
            grid.className = 'image-grid';

            items.forEach(img => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.setAttribute('role', 'button');
                card.setAttribute('tabindex', '0');
                card.innerHTML = `${img.svg}<div class="card-title">${img.title}</div>`;

                const open = () => openImage(img.id);
                card.addEventListener('click', open);
                card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') open(); });

                grid.appendChild(card);
            });

            section.appendChild(grid);
        }

        container.appendChild(section);
    });
}

/* ============================================================
   BUDOWANIE PALETY KOLORÓW
   ============================================================ */
function buildColorSwatches() {
    const container = document.getElementById('color-swatches');
    container.innerHTML = '';

    COLORS.forEach((c, i) => {
        const sw = document.createElement('div');
        sw.className = 'color-swatch' + (i === 0 ? ' selected' : '');
        sw.style.backgroundColor = c.value;
        sw.title = c.name;
        sw.setAttribute('role', 'button');
        sw.setAttribute('aria-label', c.name);
        sw.setAttribute('tabindex', '0');

        const pick = () => selectColor(c.value, sw);
        sw.addEventListener('click', pick);
        sw.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') pick(); });

        // Biały swatch – wyróżnij obramowaniem
        if (c.value.toUpperCase() === '#FFFFFF') {
            sw.style.border = '4px solid #bbb';
        }

        container.appendChild(sw);
    });
}

/* ============================================================
   WYBÓR KOLORU
   ============================================================ */
function selectColor(colorValue, swatchEl) {
    selectedColor = colorValue;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
    swatchEl.classList.add('selected');
}

/* ============================================================
   OTWIERANIE OBRAZKA
   ============================================================ */
function openImage(imageId) {
    const img = IMAGES.find(i => i.id === imageId);
    if (!img) return;

    document.getElementById('color-view-title').textContent = img.title;

    const container = document.getElementById('coloring-svg-container');
    container.innerHTML = img.svg;

    const svgEl = container.querySelector('svg');
    if (svgEl) {
        svgEl.style.maxWidth  = '100%';
        svgEl.style.maxHeight = '100%';

        // Dodaj kolorowalne tło jako pierwszy element SVG
        const vb = svgEl.viewBox.baseVal;
        const bgRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        bgRect.setAttribute('data-colorable', 'true');
        bgRect.setAttribute('data-bg', 'true');
        bgRect.setAttribute('x', vb.x || 0);
        bgRect.setAttribute('y', vb.y || 0);
        bgRect.setAttribute('width',  vb.width  || 300);
        bgRect.setAttribute('height', vb.height || 300);
        bgRect.setAttribute('fill', 'white');
        svgEl.insertBefore(bgRect, svgEl.firstChild);

        svgEl.querySelectorAll('[data-colorable]').forEach(el => {
            const applyColor = () => {
                const tag = el.tagName.toLowerCase();
                if (tag === 'line' || tag === 'polyline') {
                    // Linie kolorujemy przez stroke
                    el.setAttribute('stroke', selectedColor);
                } else {
                    el.setAttribute('fill', selectedColor);
                }
            };

            el.addEventListener('click', e => {
                e.stopPropagation();
                applyColor();
            });
            el.addEventListener('touchend', e => {
                e.preventDefault();
                e.stopPropagation();
                applyColor();
            });
        });
    }

    showView('view-color');
}

/* ============================================================
   NAWIGACJA
   ============================================================ */
function showView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
}

function goToList() {
    showView('view-list');
}

/* ============================================================
   ZAMKNIĘCIE APLIKACJI
   ============================================================ */
function confirmClose() {
    document.getElementById('modal-close').classList.add('active');
}

function cancelClose() {
    document.getElementById('modal-close').classList.remove('active');
}

function doClose() {
    if (document.exitFullscreen)            document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();

    window.close();

    setTimeout(() => {
        document.getElementById('modal-close').innerHTML = `
            <div class="modal-box">
                <div class="modal-emoji">😊</div>
                <p class="modal-text">Do zobaczenia!<br>Możesz zamknąć tę kartę.</p>
            </div>`;
    }, 400);
}

/* ============================================================
   KLAWIATURA
   ============================================================ */
document.addEventListener('keydown', e => {
    const modal = document.getElementById('modal-close');
    if (e.key === 'Escape') {
        if (modal.classList.contains('active')) cancelClose();
        else confirmClose();
    }
});

document.getElementById('modal-close').addEventListener('click', function(e) {
    if (e.target === this) cancelClose();
});
</script>
